<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engineering Vocab 2000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <header class="hero">
    <h1>Engineering Vocab 2000</h1>
    <p>Nature・STRUCTURE系の読解に向けた工学英語トレーニング</p>
    <div class="stats">
      <span id="totalCount">0 words</span>
      <span id="visibleCount">0 shown</span>
    </div>
  </header>

  <main class="container">
    <section class="panel controls">
      <div class="field">
        <label for="search">検索</label>
        <input id="search" type="text" placeholder="word / meaning / example" />
      </div>
      <div class="field">
        <label for="posFilter">品詞</label>
        <select id="posFilter">
          <option value="all">all</option>
          <option value="noun">noun</option>
          <option value="verb">verb</option>
          <option value="adjective">adjective</option>
          <option value="adverb">adverb</option>
        </select>
      </div>
      <div class="field">
        <label for="sortBy">並び替え</label>
        <select id="sortBy">
          <option value="id">id</option>
          <option value="word">word (A-Z)</option>
        </select>
      </div>
      <button id="quizBtn" class="accent">ランダム5問</button>
    </section>

    <section class="panel quiz" id="quizPanel" hidden>
      <h2>Quick Quiz</h2>
      <div id="quizCards" class="quiz-cards"></div>
    </section>

    <section class="panel table-panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>English Word</th>
              <th>IPA</th>
              <th>Part of Speech</th>
              <th>日本語の意味</th>
              <th>Example Sentence</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="pager">
        <button id="prevPage">Prev</button>
        <span id="pageInfo">1 / 1</span>
        <button id="nextPage">Next</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
